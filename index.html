<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder Boni 2.0</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">

    <meta name="theme-color" content="#1e3a5f">
</head>

<body>

<header>

<h1>Pathfinder Boni 2.0</h1>

</header>

<nav>

<button id="btnDashboard">Dashboard</button>
<button id="btnBoni">Boni</button>
<button id="btnFilter">Filter</button>
<button id="btnCharakter">Charakter</button>

</nav>

<main>

<section id="dashboard">

<h2>Aktuelle Werte</h2>

<div class="werte">

<div class="karte">
<h3>Angriff Nah</h3>
<span id="angriffNah">0</span>
</div>

<div class="karte">
<h3>Angriff Fern</h3>
<span id="angriffFern">0</span>
</div>

<div class="karte">
<h3>Schaden</h3>
<span id="schaden">0</span>
</div>

<div class="karte">
<h3>RK</h3>
<span id="rk">0</span>
</div>

<div class="karte">
<h3>Reflex</h3>
<span id="reflex">0</span>
</div>

<div class="karte">
<h3>Wille</h3>
<span id="wille">0</span>
</div>

<div class="karte">
<h3>Zähigkeit</h3>
<span id="zaehigkeit">0</span>
</div>

</div>

</section>

<section id="boni" style="display:none;">

<h2>Boniliste</h2>

<input
type="text"
id="suche"
placeholder="Bonus suchen...">

<div id="boniListe"></div>

</section>

<section id="filter" style="display:none;">

<h2>Filter</h2>

<p>Kommt in Schritt 5.</p>

</section>

<section id="charakter" style="display:none;">

<h2>Charakter</h2>

<p>Kommt in Version 2.1.</p>

</section>

</main>

<script src="js/app.js"></script>
<script src="js/filter.js"></script>
<script src="js/berechnung.js"></script>
<script src="js/makros.js"></script>
<script src="js/speicher.js"></script>

</body>
</html>
